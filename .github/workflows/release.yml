name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri release
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAVARI_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          TAVARI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: npm run tauri -- build -- --target x86_64-pc-windows-msvc

      - name: Publish GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $repo = "${{ github.repository }}"
          $bundleDir = Join-Path $PWD "src-tauri\target\release\bundle\nsis"

          $setup = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $setup) {
            throw "No se encontro el instalador NSIS en $bundleDir"
          }

          $signaturePath = "$($setup.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            throw "No se encontro la firma del instalador: $signaturePath"
          }

          $assetName = "tavari-client_${version}_windows_x86_64-setup.exe"
          $assetPath = Join-Path $bundleDir $assetName
          Copy-Item $setup.FullName $assetPath -Force

          $assetSignaturePath = "$assetPath.sig"
          Copy-Item $signaturePath $assetSignaturePath -Force

          $signature = (Get-Content $assetSignaturePath -Raw).Trim()
          $latestPath = Join-Path $bundleDir "latest.json"

          $latestJson = @{
            version = $version
            notes = "Release automatica de Tavari Client."
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "https://github.com/$repo/releases/download/$tag/$assetName"
              }
            }
          } | ConvertTo-Json -Depth 6

          Set-Content -Path $latestPath -Value $latestJson -Encoding utf8

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --title "Tavari Client $tag" `
              --notes "Release automatica de Tavari Client."
          }

          gh release upload $tag $assetPath $assetSignaturePath $latestPath --clobber
