name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAVARI_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          TAVARI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        with:
          tauriScript: npm run tauri --
          tagName: ${{ github.ref_name }}
          releaseName: Tavari Client ${{ github.ref_name }}
          releaseBody: |
            Release automatica de Tavari Client.
            Descarga el instalador desde los assets de este release.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          assetNamePattern: tavari-client_[version]_windows_[arch][setup][ext]
          args: --target x86_64-pc-windows-msvc
